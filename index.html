<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tharunipages</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f3ee;
        --surface: rgba(255, 255, 255, 0.76);
        --text: #1f2937;
        --muted: #5b6470;
        --accent: #cc5f3d;
        --accent-dark: #7a321d;
        --border: rgba(31, 41, 55, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(204, 95, 61, 0.2), transparent 32%),
          radial-gradient(circle at bottom right, rgba(122, 50, 29, 0.12), transparent 28%),
          linear-gradient(180deg, #f9f7f2 0%, var(--bg) 100%);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(760px, 100%);
        padding: 48px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--surface);
        backdrop-filter: blur(8px);
        box-shadow: 0 24px 60px rgba(31, 41, 55, 0.08);
      }

      p {
        line-height: 1.6;
      }

      .eyebrow {
        margin: 0 0 12px;
        font-size: 0.85rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent-dark);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.6rem, 7vw, 4.8rem);
        line-height: 0.95;
      }

      .lead {
        margin: 20px 0 0;
        max-width: 42rem;
        font-size: 1.1rem;
        color: var(--muted);
      }

      .pill {
        display: inline-block;
        margin-top: 28px;
        padding: 10px 16px;
        border-radius: 999px;
        background: var(--accent);
        color: white;
        font-size: 0.95rem;
        text-decoration: none;
      }

      @media (max-width: 640px) {
        main {
          padding: 32px 24px;
          border-radius: 22px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Static site starter</p>
      <h1>tharunipages</h1>
      <p class="lead">
        This repository is set up as a clean starting point for a static website.
        It works well for GitHub Pages now and can move behind CloudFront or a
        different host later without changing the basic structure.
      </p>
      <a class="pill" href="./">Ready for first deploy</a>
    </main>
  </body>
</html>
